# .github/workflows/update-projects.yml
# Place this file at: .github/workflows/update-projects.yml

name: Auto Update Projects

on:
  schedule:
    - cron: '0 0 * * *'   # runs every day at midnight UTC
  push:
    branches: [main]       # also runs on every push
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: DilipHS
        run: node scripts/update_projects.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update projects section"
          git push
