name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: DilipHS
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push to branch
        uses: EndBug/add-and-commit@v9
        with:
          add: "dist"
          message: "update snake"
          default_author: github_actions
